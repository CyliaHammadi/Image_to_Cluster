---
- name: Deploiement de l'application customisee sur K3d
  hosts: localhost
  connection: local
  gather_facts: no

  tasks:
    - name: Appliquer la configuration du Deployment Kubernetes
      shell: |
        cat <<EOF | kubectl apply -f -
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: nginx-custom-deployment
          labels:
            app: nginx-custom
        spec:
          replicas: 2
          selector:
            matchLabels:
              app: nginx-custom
          template:
            metadata:
              labels:
                app: nginx-custom
            spec:
              containers:
                - name: nginx-container
                  image: my-nginx-custom:v1
                  imagePullPolicy: Never
                  ports:
                    - containerPort: 80
        EOF

    - name: Appliquer la configuration du Service NodePort
      shell: |
        cat <<EOF | kubectl apply -f -
        apiVersion: v1
        kind: Service
        metadata:
          name: nginx-custom-service
        spec:
          type: NodePort
          selector:
            app: nginx-custom
          ports:
            - port: 80
              targetPort: 80
              nodePort: 30080
        EOF
